version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AutoJustice AI NEXUS — Docker Compose
# Services: app (FastAPI), nginx (reverse proxy)
# For PostgreSQL production: uncomment the db and redis services
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    build: .
    container_name: autojustice_app
    restart: unless-stopped
    env_file:
      - backend/.env
    volumes:
      - uploads_data:/app/backend/uploads
      - firs_data:/app/backend/firs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - autojustice_net

  nginx:
    image: nginx:1.25-alpine
    container_name: autojustice_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # Uncomment with SSL certs
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro   # Uncomment for SSL
    depends_on:
      - app
    networks:
      - autojustice_net

  # ── PostgreSQL (production) ─────────────────────────────────────────────────
  # db:
  #   image: postgres:16-alpine
  #   container_name: autojustice_db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: autojustice
  #     POSTGRES_USER: autojustice
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - autojustice_net

  # ── Redis (for async queuing, rate limiting in production) ──────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: autojustice_redis
  #   restart: unless-stopped
  #   networks:
  #     - autojustice_net

volumes:
  uploads_data:
  firs_data:
  # postgres_data:

networks:
  autojustice_net:
    driver: bridge
