# ─────────────────────────────────────────────────────────────────────────────
# AutoJustice AI NEXUS — NGINX Reverse Proxy & WAF Config
# Provides: SSL termination, rate limiting, security headers, gzip
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=citizen_submit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=officer_login:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m    rate=60r/m;

server {
    listen 80;
    server_name _;      # Replace with your domain: autojustice.yourdomain.gov.in

    # ── Security Headers ───────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"            always;
    add_header X-XSS-Protection           "1; mode=block"         always;
    add_header X-Content-Type-Options     "nosniff"               always;
    add_header Referrer-Policy            "strict-origin"         always;
    add_header Permissions-Policy         "geolocation=(), camera=()" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com; img-src 'self' data:;" always;

    # ── Gzip Compression ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # ── Client Body Limit (for evidence uploads) ──────────────────────
    client_max_body_size 30M;

    # ── Submission Rate Limiting ──────────────────────────────────────
    location /api/reports/submit {
        limit_req zone=citizen_submit burst=2 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;    # AI analysis can take time
    }

    # ── Auth Rate Limiting ────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=officer_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── General API ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static Files (cached) ─────────────────────────────────────────
    location /static/ {
        proxy_pass       http://app:8000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Frontend Routes ───────────────────────────────────────────────
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Block sensitive paths ─────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~* \.(env|db|sqlite)$ {
        deny all;
    }
}
